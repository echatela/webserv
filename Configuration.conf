server {
    listen 8081;
    root ./www;
	client_max_body_size 1200000000;

    location /images {
        root ./assets;
    }
    location /contacts {
        root ./database;
    }
	location /cgi {
        root ./cgi-bin;
        cgi .py /usr/bin/python3;
	}
    location /upload {
        root ./assets;
    }
}

