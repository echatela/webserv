server {
    listen 8080;
    root ./www;
	client_max_body_size 120000000;

	error_page 204 ./errors/204.html;
	error_page 301 ./errors/301.html;
	error_page 400 ./errors/400.html;
	error_page 403 ./errors/403.html;
	error_page 404 ./errors/404.html;
	error_page 405 ./errors/405.html;
	error_page 413 ./errors/413.html;
	error_page 500 ./errors/500.html;
	error_page 501 ./errors/501.html;

    location /folfer {
        root ./www;
		upload off;
		autoindex off;
    }
    location /images {
        root ./assets;
		upload off;
    }
    location /contacts {
        root ./database;
		upload off;
    }
	location /cgi {
        root ./cgi-bin;
        cgi .py /usr/bin/python3;
		upload on;
	}
    location /upload {
        root ./assets;
		upload on;
    }
}

